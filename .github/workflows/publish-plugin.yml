name: Sync plugin to marketplace

# git-subdir pin model
# -------------------
# The marketplace (Dev-Jahn/jahns-cc-marketplace) no longer consumes a separate
# published plugin repo — the old plugin mirror repo has been deleted. The
# ccbroker entry in marketplace.json instead uses a "git-subdir" source that
# points straight at THIS repo's claude-plugin/ directory, pinned to an exact
# commit SHA:
#
#   "source": { "source": "git-subdir", "url": "https://github.com/Dev-Jahn/ccbroker",
#               "path": "claude-plugin", "sha": "<commit>" }
#
# The url is a full https URL on purpose: the "owner/repo" shorthand makes
# Claude Code clone over ssh (git@github.com), which dies on hosts without a
# GitHub ssh key or with a non-22 outbound ssh port (e.g. B200-2's cluster-wide
# `Port 49001` in /etc/ssh/ssh_config). https clones work anonymously anywhere.
#
# So there is nothing to publish or tag. Every change to claude-plugin/ on main
# just needs to MOVE that pin to the new HEAD commit (and copy the plugin's
# version across). That is all this workflow does: it rewrites only the ccbroker
# entry's .source.sha (= this run's commit) and .version, then commits that one
# change to the marketplace repo.
#
# Requires one repo secret:
#   PUBLISH_TOKEN — fine-grained PAT with `contents: write` on
#     Dev-Jahn/jahns-cc-marketplace ONLY. It used to also need write on the old
#     plugin mirror repo; that repo is deleted, so marketplace is the only
#     scope required now.

on:
  push:
    branches: [main]
    paths:
      - 'claude-plugin/**'
      - '.github/workflows/publish-plugin.yml'
  workflow_dispatch:

concurrency:
  group: plugin-publish
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout self
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Read plugin version
        id: ver
        run: |
          set -euo pipefail
          VERSION=$(jq -r '.version' claude-plugin/.claude-plugin/plugin.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "ccbroker plugin version = ${VERSION}"

      - name: Checkout marketplace
        uses: actions/checkout@v4
        with:
          repository: Dev-Jahn/jahns-cc-marketplace
          path: marketplace
          token: ${{ secrets.PUBLISH_TOKEN }}
          fetch-depth: 1

      - name: Move ccbroker pin to this commit
        working-directory: marketplace
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"

          jq --arg sha "${GITHUB_SHA}" --arg ver "${VERSION}" '
            .plugins |= map(
              if .name == "ccbroker" then
                .source = {"source":"git-subdir","url":"https://github.com/Dev-Jahn/ccbroker","path":"claude-plugin","sha":$sha}
                | .version = $ver
              else . end
            )
          ' .claude-plugin/marketplace.json > .claude-plugin/marketplace.json.new
          mv .claude-plugin/marketplace.json.new .claude-plugin/marketplace.json

          git config user.name 'ccbroker-publish-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "marketplace already pins ccbroker at v${VERSION} @ ${GITHUB_SHA}; no-op"
            exit 0
          fi

          git add .claude-plugin/marketplace.json
          git commit -m "ccbroker: v${VERSION} @ ${GITHUB_SHA:0:7}"
          git push origin HEAD:main

      - name: Summary
        run: |
          echo "ccbroker pinned to Dev-Jahn/ccbroker@${GITHUB_SHA} (v${{ steps.ver.outputs.version }})"
          echo "marketplace: https://github.com/Dev-Jahn/jahns-cc-marketplace"
