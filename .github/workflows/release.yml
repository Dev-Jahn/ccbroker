name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - run: go vet ./...
      - run: go test ./...

      - name: Build release binaries
        run: |
          mkdir -p dist
          build() {
            bin=$1 os=$2 arch=$3
            out="dist/${bin}_${os}_${arch}"
            if [ "$os" = windows ]; then
              out="${out}.exe"
            fi
            echo "building $out"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
              -o "$out" ./cmd/"$bin"
          }
          for osarch in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            build ccb "${osarch%/*}" "${osarch#*/}"
          done
          for osarch in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            build ccbrokerd "${osarch%/*}" "${osarch#*/}"
          done
          (cd dist && sha256sum * > checksums.txt)

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --generate-notes
